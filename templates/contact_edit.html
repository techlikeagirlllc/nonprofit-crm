{% extends "base.html" %}
{% block title %}Edit {{ contact.name }} — {{ org_name }}{% endblock %}

{% block content %}
<a class="back-link" href="/contacts/{{ contact.id }}">← Back to {{ contact.name }}'s profile</a>

<div class="page-header">
    <h1>Edit Contact</h1>
    <p>Update information for <strong>{{ contact.name }}</strong>.</p>
</div>

<div class="card">
    <form action="/contacts/{{ contact.id }}/edit" method="POST">
        <div class="form-row cols-2">
            <div>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ contact.name }}" required>
            </div>
            <div>
                <label for="contact_type">Type</label>
                <select id="contact_type" name="contact_type" onchange="toggleDonation(this.value)">
                    <option value="volunteer" {% if contact.contact_type == 'volunteer' %}selected{% endif %}>Volunteer</option>
                    <option value="donor"     {% if contact.contact_type == 'donor'     %}selected{% endif %}>Donor</option>
                </select>
            </div>
        </div>
        <div class="form-row cols-2">
            <div>
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ contact.phone }}" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ contact.email }}" required>
            </div>
        </div>
        <div class="form-row">
            <div>
                <label for="address">Address</label>
                <input type="text" id="address" name="address" value="{{ contact.address }}"
                       placeholder="123 Main St, City, State 00000">
            </div>
        </div>
        <div class="form-row">
            <div>
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Any additional notes…">{{ contact.notes }}</textarea>
            </div>
        </div>
        <div id="donation-row" class="form-row" style="display:none;">
            <div style="max-width:300px;">
                <label for="donation_amount">Donation Amount ($)</label>
                <input type="number" id="donation_amount" name="donation_amount"
                       value="{{ contact.donation_amount if contact.donation_amount else '' }}"
                       placeholder="0.00" min="0" step="0.01">
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:4px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a class="btn btn-outline" href="/contacts/{{ contact.id }}">Cancel</a>
        </div>
    </form>
</div>

<script>
function toggleDonation(type) {
    var row   = document.getElementById('donation-row');
    var input = document.getElementById('donation_amount');
    if (type === 'donor') { row.style.display = ''; input.required = true; }
    else                  { row.style.display = 'none'; input.required = false; }
}
toggleDonation(document.getElementById('contact_type').value);
</script>
{% endblock %}
